<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="frame">
        <div class="display">
            <div class="input">999999999999999</div>
        </div>
        
            <ul>
                <li class="ac">AC</li>
                <li class="backspace"><img src="backspace-icon-size_24.png" alt="Backspace icon" width="50px height: 50px"></li>
                <li class="divide" id="operator">/</li>
                <li class="multiply" id="operator">*</li>
                <li class="seven" id="digit">7</li>
                <li class="eight" id="digit">8</li>
                <li class="nine" id="digit">9</li>
                <li class="subtract" id="operator">-</li>
                <li class="four" id="digit">4</li>
                <li class="five" id="digit">5</li>
                <li class="six" id="digit">6</li>
                <li class="add" id="operator">+</li>
                <li class="one" id="digit">1</li>
                <li class="two" id="digit">2</li>
                <li class="three" id="digit">3</li>
                <li class="zero" id="digit">0</li>
                <li class="point">.</li>
                <li class="equals" id="calculate">=</li>
            </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
