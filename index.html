<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="frame">
        <div class="display"></div>
        
            <ul>

                <li class="backspace"><img src="backspace-icon-size_24.png" alt="Backspace icon" width="50px height: 50px"></li>
                <li class="divide">/</li>
                <li class="multiply">*</li>
                <li class="seven">7</li>
                <li class="eight">8</li>
                <li class="nine">9</li>
                <li class="subtract">-</li>
                <li class="four">4</li>
                <li class="five">5</li>
                <li class="six">6</li>
                <li class="add">+</li>
